name: Sync Fork

on:
  schedule:
    - cron: '0 7 * * *' # 9h Paris
  workflow_dispatch:

jobs:
  sync:
    runs-on: macos-26
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Octane0411/open-vibe-island.git
          git fetch upstream
          git fetch origin

      - name: Check for upstream changes
        id: check
        run: |
          LOCAL=$(git rev-parse origin/main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream changes, skipping"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Upstream has new commits: $LOCAL -> $UPSTREAM"
          fi

      - name: Sync main
        if: steps.check.outputs.changed == 'true'
        run: |
          git checkout -B main upstream/main
          git push origin main --force

      - name: Rebase feature branches
        if: steps.check.outputs.changed == 'true'
        id: rebase
        run: |
          FEATURES=(
            feat/opencode-structured-questions
            feat/notification-level
            feat/question-stepper
          )

          FAILED=()
          for branch in "${FEATURES[@]}"; do
            if git rev-parse --verify "origin/$branch" &>/dev/null; then
              git checkout -B "$branch" "origin/$branch"
              if git rebase main; then
                git push origin "$branch" --force-with-lease
                echo "✓ $branch"
              else
                git rebase --abort
                FAILED+=("$branch")
                echo "✗ $branch CONFLICT"
              fi
            else
              echo "⊘ $branch not found, skipping"
            fi
          done

          if [ ${#FAILED[@]} -gt 0 ]; then
            echo "failed=${FAILED[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebuild integration branch
        if: steps.check.outputs.changed == 'true'
        id: integration
        run: |
          FEATURES=(
            feat/opencode-structured-questions
            feat/notification-level
            feat/question-stepper
          )

          git checkout -B my-build main

          MERGE_FAILED=()
          for branch in "${FEATURES[@]}"; do
            if git rev-parse --verify "$branch" &>/dev/null; then
              if ! git merge "$branch" --no-edit; then
                git merge --abort
                MERGE_FAILED+=("$branch")
                echo "✗ $branch merge failed"
              else
                echo "✓ $branch merged"
              fi
            fi
          done

          git push origin my-build --force

          if [ ${#MERGE_FAILED[@]} -gt 0 ]; then
            echo "failed=${MERGE_FAILED[*]}" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify on conflicts
        if: steps.check.outputs.changed == 'true' && (steps.rebase.outputs.failed || steps.integration.outputs.failed)
        uses: actions/github-script@v7
        with:
          script: |
            const rebaseFailed = '${{ steps.rebase.outputs.failed }}';
            const mergeFailed = '${{ steps.integration.outputs.failed }}';
            const title = '⚠️ Fork sync: conflicts detected';
            const body = [
              '## Fork Sync Report',
              '',
              rebaseFailed ? `**Rebase conflicts:** ${rebaseFailed}` : '',
              mergeFailed ? `**Merge conflicts:** ${mergeFailed}` : '',
              '',
              'Manual resolution needed. Run locally:',
              '```bash',
              'git fetch origin && git checkout <branch> && git rebase origin/main',
              '```'
            ].filter(Boolean).join('\n');

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'fork-sync',
              state: 'open'
            });
            for (const issue of existing.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['fork-sync']
            });

  build:
    needs: sync
    if: always() && needs.sync.result == 'success'
    runs-on: macos-26
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: my-build

      - name: Show Swift version
        run: swift --version

      - name: Run harness
        run: zsh scripts/harness.sh ci

      - name: Build and package
        run: |
          brew install create-dmg
          pip3 install --break-system-packages Pillow
          zsh scripts/package-app.sh

      - name: Upload Open Island.app
        uses: actions/upload-artifact@v4
        with:
          name: OpenIsland-${{ github.run_number }}
          path: output/package/Open Island.zip
          retention-days: 7

      - name: Notify build failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'fork-sync',
              state: 'open',
            });
            for (const issue of existing.data) {
              if (issue.title.includes('my-build broken')) {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  state: 'closed',
                });
              }
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔴 my-build broken after sync',
              body: `Build failed after upstream sync.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['fork-sync'],
            });
